<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GDI Smart Assistant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <div class="container">
    <div class="status-container">
      <span class="status-dot"></span>
      <span class="status-text">GDI_SYSTEMS // ONLINE</span>
    </div>
    <h1>GDI Smart Assistant</h1>
    <div id="chat-box" class="chat-box"></div>
    <form id="chat-form">
      <input type="text" id="user-input" placeholder="Tanyakan jadwal ibadah, event, Bible Study, atau info GDI..." autocomplete="off" required />
      <button type="submit">Kirim</button>
    </form>
  </div>
  <script src="script.js"></script>
</body>
</html>
